{% extends 'base.html' %}

{% block title %}Cadastrar Novo Livro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h2 class="mb-4 text-dark">📝 Cadastrar Nova Obra</h2>
            
            <form action="/livro/novo" method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">ISBN (Ex: 978...)</label>
                        <input type="text" name="isbn" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Título</label>
                        <input type="text" name="titulo" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Autor</label>
                        <input type="text" name="autor" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gênero</label>
                        <input type="text" name="genero" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ano de Publicação</label>
                        <input type="number" name="ano_publicacao" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Editora</label>
                        <input type="text" name="editora" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Quantidade de Páginas</label>
                        <input type="number" name="paginas" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Localização (Ex: Estante A1, Prateleira 2)</label>
                        <input type="text" name="localizacao" class="form-control" required>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2 justify-content-end">
                    <a href="/" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar Livro</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
