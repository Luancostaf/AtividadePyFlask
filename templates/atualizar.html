{% extends 'base.html' %}

{% block title %}Atualizar Livro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm p-4">
            <h2 class="mb-4 text-dark">🔄 Atualizar Registro do Livro</h2>
            
            <form action="/atualizar?isbn={{ livro.isbn }}" method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">ISBN (Identificador Único)</label>
                        <input type="text" class="form-control bg-light" value="{{ livro.isbn }}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Título</label>
                        <input type="text" name="titulo" class="form-control" value="{{ livro.titulo }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Autor</label>
                        <input type="text" name="autor" class="form-control" value="{{ livro.autor }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Gênero</label>
                        <input type="text" name="genero" class="form-control" value="{{ livro.genero }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Ano de Publicação</label>
                        <input type="number" name="ano_publicacao" class="form-control" value="{{ livro.ano_publicacao }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Editora</label>
                        <input type="text" name="editora" class="form-control" value="{{ livro.editora }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Páginas</label>
                        <input type="number" name="paginas" class="form-control" value="{{ livro.paginas }}" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Localização</label>
                        <input type="text" name="localizacao" class="form-control" value="{{ livro.localizacao }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="disponivel" {% if livro.status == 'disponivel' %}selected{% endif %}>Disponível</option>
                            <option value="emprestado" {% if livro.status == 'emprestado' %}selected{% endif %}>Emprestado</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2 justify-content-end">
                    <a href="/" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
